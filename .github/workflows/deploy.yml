- name: Prepare deployment directory
        run: |
          # 1. Create the base directory
          mkdir -p deploy
          
          # 2. Copy the Hub app into the absolute root of the deploy directory first
          cp -r apps/hub/dist/* deploy/
          
          # 3. Create the nested subdirectories inside the deploy folder *after* Hub is copied
          mkdir -p deploy/designer
          mkdir -p deploy/runtime   # Note: Change to 'respondent' if your apps/runtime/vite.config.ts base is set to '/mobilesurvey/respondent/'
          
          # 4. Copy the rest of the sub-apps into their respective directories
          cp -r apps/designer/dist/* deploy/designer/
          cp -r apps/runtime/dist/* deploy/runtime/   # Note: Change to deploy/respondent/ if applicable

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy   # This uploads the contents of 'deploy' directly to your domain root
