<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — mobilesurvey</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #1b2733;
      background: #f4f6f9;
      font-size: 14px;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #1f5fae;
    }
    .breadcrumb {
      margin-bottom: 20px;
      font-size: 13px;
    }
    .breadcrumb a {
      color: #1f5fae;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      text-decoration: underline;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, textarea, select {
      font: inherit;
      width: 100%;
      padding: 8px;
      border: 1px solid #d7dee6;
      border-radius: 6px;
      background: #fff;
      color: #1b2733;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #1f5fae;
      box-shadow: 0 0 0 3px rgba(31, 95, 174, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    .hint {
      color: #5b6b7b;
      font-size: 12px;
      margin-top: 4px;
    }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: #1f5fae;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      width: 100%;
    }
    button:hover {
      background: #174d8f;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .alert-success {
      background: #e8f6ee;
      color: #1a7f4b;
      border: 1px solid #1a7f4b;
    }
    .alert-error {
      background: #fdeceb;
      color: #b3261e;
      border: 1px solid #b3261e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="/mobilesurvey/">← Back to designer</a>
    </div>

    <h1>Get in touch</h1>
    <p>Have a feature request, bug report, or question? Send a message below.</p>

    <div id="message" style="display: none;"></div>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="subject">Subject *</label>
        <select id="subject" name="subject" required>
          <option value="">Select a topic…</option>
          <option value="Feature Request">Feature Request</option>
          <option value="Bug Report">Bug Report</option>
          <option value="Question">Question</option>
          <option value="Feedback">Feedback</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message-text">Message *</label>
        <textarea id="message-text" name="message" required placeholder="Tell me what you think…"></textarea>
      </div>

      <button type="submit">Send message</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const formData = new FormData(form);
      formData.append('access_key', '18bcef79-b599-4986-b882-8bc2426db5df');

      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData,
        });

        if (response.ok) {
          messageDiv.className = 'alert alert-success';
          messageDiv.textContent = '✓ Message sent! I\'ll get back to you soon.';
          messageDiv.style.display = 'block';
          form.reset();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send message';
        } else {
          throw new Error('Form submission failed');
        }
      } catch (error) {
        messageDiv.className = 'alert alert-error';
        messageDiv.textContent = '✗ Error sending message. Please try again or email push.peji@gmail.com';
        messageDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send message';
      }
    });
  </script>
</body>
</html>
